# Render Blueprint for the PlacePrep API.
#
# This documents the exact deployment config as code, instead of leaving it
# as undocumented manual dashboard clicks -- see DEPLOYMENT.md for the full
# walkthrough (Supabase setup, Vercel frontend, and everything env vars here
# reference). To use: Render dashboard -> New -> Blueprint -> point at this
# repo. Render will read this file and propose the service below; secrets
# (marked sync: false) still have to be filled in by hand in the dashboard
# -- this file deliberately never contains real values.
services:
  - type: web
    name: placeprep-api
    runtime: python
    plan: free
    region: oregon
    rootDir: server
    buildCommand: >-
      apt-get update &&
      apt-get install -y tesseract-ocr poppler-utils &&
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false # your STABLE deployed Vercel URL(s) (custom domain / production alias), comma-separated -- see DEPLOYMENT.md
      - key: CORS_ORIGIN_REGEX
        # Vercel issues a new preview URL on every deploy, AND -- confirmed
        # in practice on this project -- doesn't keep the project-name
        # portion of that hostname stable either: the SAME project has been
        # observed as both
        #   place-prep-ai-processing-platform-client-65udk2i79.vercel.app
        #   place-prep-ai-processing-platform-c.vercel.app
        # (Vercel truncates the generated name to fit its own length
        # budget, and where it cuts isn't predictable from outside.) A
        # regex anchored to a literal project-name prefix is therefore NOT
        # reliable here -- it broke the first time the truncation point
        # shifted. This pattern instead trusts any single-level
        # *.vercel.app subdomain (still anchored/full-match, so it does NOT
        # match a non-Vercel host or a nested subdomain). That's
        # deliberately broader than "just this project" -- acceptable here
        # because auth is Bearer-token-based (see client/src/lib/api-
        # client.ts), not cookie-based, so another Vercel-hosted site
        # matching this pattern still can't forge a request as a signed-in
        # user without already having that user's token through some other
        # means unrelated to CORS. If you want it scoped tighter than that
        # trade-off, don't rely on a guessed pattern -- put your project's
        # exact current domain(s) in CORS_ORIGINS instead (copy them
        # literally from Vercel's dashboard, not from a URL you've seen in
        # one error message, since -- per the above -- it can change).
        value: ^https://[a-zA-Z0-9-]+\.vercel\.app$
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PDF_STORAGE_BUCKET
        value: pdfs
      - key: MAX_PDF_SIZE_BYTES
        value: "26214400"
      - key: MAX_IMAGE_SIZE_BYTES
        value: "15728640"
      - key: OCR_ENABLED
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_DEFAULT
        value: 120/minute
      - key: RATE_LIMIT_UPLOAD
        value: 10/minute
      - key: RATE_LIMIT_QUIZ_SUBMIT
        value: 30/minute
      # RATE_LIMIT_STORAGE_URI intentionally omitted: unset means the
      # in-memory limiter, correct for this single-instance free-tier plan.
      # Add it (pointed at a Redis instance) only if you scale to more than
      # one instance -- see app/core/rate_limit.py's own note on why.
