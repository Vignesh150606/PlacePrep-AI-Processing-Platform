<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f14" />
    <title>You're offline — PlacePrep</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: max(24px, env(safe-area-inset-bottom));
        padding-top: max(24px, env(safe-area-inset-top));
        background: #0f0f14;
        color: #f2f1f7;
        font-family:
          "Geist",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .card {
        max-width: 380px;
        text-align: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 14px;
        background: #6e56cf;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 28px;
        height: 28px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #a7a5b3;
        margin: 0 0 24px;
      }
      button {
        appearance: none;
        border: none;
        border-radius: 10px;
        background: #6e56cf;
        color: white;
        font-size: 14px;
        font-weight: 500;
        padding: 11px 20px;
        min-height: 44px;
        cursor: pointer;
      }
      button:active {
        background: #5a45ab;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        PlacePrep can't reach the network right now, and this page hasn't been
        loaded before, so there's nothing saved to show. Reconnect and try
        again — anything you'd already opened will keep working offline.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
