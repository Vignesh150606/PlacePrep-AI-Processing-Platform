<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- MODIFIED (Phase 16): swapped the placeholder favicon for the real
         PlacePrep logo mark -- see components/ui/logo.tsx for the in-app
         version and vite.config.ts's PWA manifest for the installed-app icons. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- MODIFIED (Phase 14, Part 1 -- Mobile Experience & PWA):
         viewport-fit=cover lets content use env(safe-area-inset-*) to sit
         correctly around notches / home indicators instead of under them.
         The apple-mobile-web-app-* trio is iOS Safari's own pre-manifest
         mechanism for "open full-screen from the home screen, no browser
         chrome" -- iOS still honors these even though it also reads the
         web app manifest for icons/name. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6e56cf" />
    <!-- `mobile-web-app-capable` is the standardized, cross-browser tag
         (Chrome/Android read this one and flag the Apple-prefixed tag
         alone as deprecated). `apple-mobile-web-app-capable` is kept
         alongside it because iOS Safari -- including versions before
         17.4, which is still a meaningful share of installs -- only
         honors the Apple-prefixed name; it ignores the standard one. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PlacePrep" />
    <title>PlacePrep — Placement Intelligence Platform</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("placeprep-theme");
          var resolved =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          if (resolved === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
